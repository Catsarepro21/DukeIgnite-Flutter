name: Build and Release Unified App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.0.24)'
        required: true
        default: 'v1.0.24'
  push:
    tags:
      - 'v*' # Trigger automatically when a version tag is pushed

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios
          pod repo update
          pod install

      - name: Build iOS App (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Prepare Payload for IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir -p Payload
          mv Runner.app Payload/

      - name: Zip into .ipa
        working-directory: build/ios/iphoneos
        run: zip -qq -r -9 DukeIgniteIOSFormaldehydeSensor.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/DukeIgniteIOSFormaldehydeSensor.ipa

  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows --release

      - name: Build MSIX Installer
        # echo N skips the local certificate installation prompt which blocks CI
        run: echo "N" | flutter pub run msix:create

      - name: Rename Executable for Portable Bundle
        run: Rename-Item -Path build\windows\x64\runner\Release\formaldehyde_monitor.exe -NewName DukeIgnite.exe

      - name: Create Portable ZIP Archive
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath DukeIgnite_Windows_Portable.zip

      - name: Upload Windows MSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: build\windows\x64\runner\Release\formaldehyde_monitor.msix

      - name: Upload Windows ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: DukeIgnite_Windows_Portable.zip

  create-release:
    name: 📦 Create Unified Release
    needs: [build-ios, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa

      - name: Download Windows MSIX Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msix

      - name: Download Windows ZIP Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: Determine Tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.VERSION }}
          name: Release ${{ steps.tag.outputs.VERSION }}
          files: |
            DukeIgniteIOSFormaldehydeSensor.ipa
            formaldehyde_monitor.msix
            DukeIgnite_Windows_Portable.zip
          body: |
            Duke Ignite Formaldehyde App: Installation Guide
            
            iOS Installation
            1. Downloads
            App File: Download DukeIgniteIOSFormaldehydeSensor.ipa
            Sideloadly Tool: Windows | macOS
            Windows Users Only: You must also install the web versions of iTunes and iCloud.
            
            2. Sideloading Steps
            Open Sideloadly and drag the .ipa file into the application window.
            Enter your Apple ID and connect your iOS device via USB.
            Press Start and wait for the "Done" status.
            
            3. Device Authorization
            Trust Developer: Go to Settings > General > VPN & Device Management, click on developer apps(Will say my email), and select Trust.
            Enable Developer Mode: Go to Settings > Privacy & Security > Developer Mode, toggle it On, and Restart your phone. Select Turn On after the reboot.
            
            Windows Installation (PC)
            Option A: Recommended Installer (MSIX)
            1. Download the `formaldehyde_monitor.msix` file.
            2. Before installing, right-click the file -> Properties -> Digital Signatures.
            3. Select the signature -> Details -> View Certificate -> Install Certificate.
            4. Place it in "Local Machine" -> "Trusted Root Certification Authorities".
            5. Double-click the `.msix` file to install the app cleanly.
            
            Option B: Portable Version (ZIP)
            1. Download `DukeIgnite_Windows_Portable.zip`.
            2. Extract the folder: Right-click it and select Extract All...
            3. Open the newly extracted folder and double-click `DukeIgnite.exe`.
            4. If Microsoft SmartScreen appears, click "More info" and "Run anyway".
