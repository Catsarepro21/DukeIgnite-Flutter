name: Build and Release Unified App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.0.24)'
        required: true
        default: 'v1.0.24'
  push:
    tags:
      - 'v*' # Trigger automatically when a version tag is pushed

permissions:
  contents: write

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios
          pod repo update
          pod install

      - name: Build iOS App (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Prepare Payload for IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir -p Payload
          mv Runner.app Payload/

      - name: Zip into .ipa
        working-directory: build/ios/iphoneos
        run: zip -qq -r -9 DukeIgniteIOSFormaldehydeSensor.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/DukeIgniteIOSFormaldehydeSensor.ipa

  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows --release

      - name: Rename Executable for Portable Bundle and Installer
        run: Rename-Item -Path build\windows\x64\runner\Release\formaldehyde_monitor.exe -NewName DukeIgnite.exe

      - name: Build Windows Installer (Inno Setup)
        run: |
          choco install innosetup
          iscc windows/installer.iss

      - name: Create Portable ZIP Archive
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath DukeIgnite_Windows_Portable.zip

      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Output/DukeIgnite_Installer.exe

      - name: Upload Windows ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: DukeIgnite_Windows_Portable.zip

  create-release:
    name: 📦 Create Unified Release
    needs: [build-ios, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa

      - name: Download Windows Installer Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: Download Windows ZIP Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: Determine Tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.VERSION }}
          name: Release ${{ steps.tag.outputs.VERSION }}
          files: |
            DukeIgniteIOSFormaldehydeSensor.ipa
            DukeIgnite_Installer.exe
            DukeIgnite_Windows_Portable.zip
          body: |
            # Duke Ignite Formaldehyde App: Installation Guide
            
            ---
            
            ##  iOS Installation
            
            ### 1. Downloads
            * **App File:** [Download DukeIgniteIOSFormaldehydeSensor.ipa](https://github.com/Catsarepro21/DukeIgnite-Flutter/releases/download/${{ steps.tag.outputs.VERSION }}/DukeIgniteIOSFormaldehydeSensor.ipa)
            * **Sideloadly Tool:** [Windows](https://sideloadly.io/SideloadlySetup64.exe) | [macOS](https://sideloadly.io/SideloadlySetup.dmg)
            * **Windows Users Only:** You must also install the web versions of [iTunes](https://www.apple.com/itunes/download/win64) and [iCloud](https://updates.cdn-apple.com/2020/windows/001-39935-20200911-1A70AA56-F448-11EA-8CC0-99D41950005E/iCloudSetup.exe).
            
            ### 2. Sideloading Steps
            1. Open **Sideloadly** and drag the `.ipa` file into the application window.
            2. Enter your **Apple ID** and connect your iOS device via USB.
            3. Press **Start** and wait for the "Done" status.
            
            ### 3. Device Authorization
            1. **Trust Developer:** Go to **Settings > General > VPN & Device Management**, click on developer apps(Will say my email), and select **Trust**.
            2. **Enable Developer Mode:** Go to **Settings > Privacy & Security > Developer Mode**, toggle it **On**, and **Restart** your phone. Select **Turn On** after the reboot.
            
            ---
            
            ## Windows Installation (PC)
            
            ### 1. Download Option A (Recommended)
            * **Windows Installer:** [Download DukeIgnite_Installer.exe](https://github.com/Catsarepro21/DukeIgnite-Flutter/releases/download/${{ steps.tag.outputs.VERSION }}/DukeIgnite_Installer.exe)
            
            **Setup Instructions**
            1. **Launch:** Double click the downloaded installer.
            2. **SmartScreen:** If Microsoft SmartScreen appears, click "More info" and "Run anyway".
            3. **Install:** Follow the setup wizard to install the app and create a desktop shortcut.
            
            ---
            
            ### 2. Download Option B (Portable)
            * **Windows Bundle:** [Download DukeIgnite_Windows_Portable.zip](https://github.com/Catsarepro21/DukeIgnite-Flutter/releases/download/${{ steps.tag.outputs.VERSION }}/DukeIgnite_Windows_Portable.zip)
            
            **Setup Instructions**
            1. **Extract the Folder:** Locate the downloaded `.zip` file. Right-click it and select **Extract All...**
            2. **Launch:** Open the newly extracted folder and double-click `DukeIgnite.exe` to start the application.
            3. **SmartScreen:** If Microsoft SmartScreen appears, click "More info" and "Run anyway".
