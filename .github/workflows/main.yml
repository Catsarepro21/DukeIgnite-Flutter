name: Build and Release Unified App

on:
  push:
    branches:
      - master  # Runs on every push to master

permissions:
  contents: write

jobs:
  check-version:
    name:  Check Version Change
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check if version in pubspec.yaml changed
        id: check
        run: |
          if git diff HEAD^ HEAD pubspec.yaml | grep -q '^+version:'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build-web:
    name:  Web Build & Deploy
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Extract Version
        id: extract_version
        run: |
          APP_VERSION=$(grep '^version: ' pubspec.yaml | awk '{print $2}' | cut -d '+' -f 1)
          echo "VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Build web
        run: |
          ENCODED_KEY=$(echo -n "${{ secrets.GEMINI_API_KEY }}" | base64 -w 0)
          flutter build web --release --base-href "/DukeIgnite-Flutter/" --dart-define=APP_VERSION=${{ env.VERSION }} --dart-define=GEMINI_API_KEY_B64="$ENCODED_KEY"
        env:
          VERSION: ${{ env.VERSION }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          force_orphan: true

  build-ios:
    name:  iOS Build
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios
          pod repo update
          pod install

      - name: Build iOS App (Unsigned)
        run: |
          ENCODED_KEY=$(echo -n "${{ secrets.GEMINI_API_KEY }}" | base64 -w 0)
          flutter build ios --release --no-codesign --dart-define=GEMINI_API_KEY_B64="$ENCODED_KEY"

      - name: Prepare Payload for IPA
        working-directory: build/ios/iphoneos
        run: |
          mkdir -p Payload
          mv Runner.app Payload/

      - name: Zip into .ipa
        working-directory: build/ios/iphoneos
        run: zip -qq -r -9 DukeIgniteIOSFormaldehydeSensor.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/DukeIgniteIOSFormaldehydeSensor.ipa

  build-windows:
    name:  Windows Build
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows App
        shell: pwsh
        run: |
          $Bytes = [System.Text.Encoding]::UTF8.GetBytes("${{ secrets.GEMINI_API_KEY }}")
          $EncodedKey = [Convert]::ToBase64String($Bytes)
          flutter build windows --release --dart-define=GEMINI_API_KEY_B64="$EncodedKey"

      - name: Rename Executable for Portable Bundle and Installer
        run: Rename-Item -Path build\windows\x64\runner\Release\formaldehyde_monitor.exe -NewName DukeIgnite.exe

      - name: Build Windows Installer (Inno Setup)
        run: |
          choco install innosetup
          iscc windows/installer.iss

      - name: Create Portable ZIP Archive
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath DukeIgnite_Windows_Portable.zip

      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: windows/Output/DukeIgnite_Installer.exe

      - name: Upload Windows ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: DukeIgnite_Windows_Portable.zip

  build-android:
    name:  Android Build
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          ENCODED_KEY=$(echo -n "${{ secrets.GEMINI_API_KEY }}" | base64 -w 0)
          flutter build apk --release --dart-define=GEMINI_API_KEY_B64="$ENCODED_KEY"

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk DukeIgnite_Android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: DukeIgnite_Android.apk

  build-linux:
    name:  Linux Build
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: |
          ENCODED_KEY=$(echo -n "${{ secrets.GEMINI_API_KEY }}" | base64 -w 0)
          flutter build linux --release --dart-define=GEMINI_API_KEY_B64="$ENCODED_KEY"

      - name: Create Linux ZIP
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../DukeIgnite_Linux.zip *
          cd ../../../../../

      - name: Upload Linux ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: DukeIgnite_Linux.zip

  create-release:
    name:  Create Unified Release
    needs: [build-ios, build-windows, build-android, build-linux, check-version]
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code to Read Version
        uses: actions/checkout@v4

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: .

      - name: Download Windows Installer Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: .

      - name: Download Windows ZIP Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: .

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: .

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-zip
          path: .

      - name: Determine Tag
        id: tag
        run: |
          APP_VERSION=$(grep '^version: ' pubspec.yaml | awk '{print $2}' | tr '+' '-')
          echo "VERSION=v$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.tag.outputs.VERSION }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ steps.tag.outputs.VERSION }}
          files: |
            DukeIgniteIOSFormaldehydeSensor.ipa
            DukeIgnite_Installer.exe
            DukeIgnite_Windows_Portable.zip
            DukeIgnite_Android.apk
            DukeIgnite_Linux.zip
          body: |
            # Duke Ignite Formaldehyde App: Installation Guide
            
            ---
            
            ## Web Version (No Installation Required)
            * **Access Instantly via Browser:** [Open Web App](https://catsarepro21.github.io/DukeIgnite-Flutter/)
            (Note: Browser MUST be able to use Bluetooth, such as chrome and edge on desktop. Browsers will NOT work on mobile without a specialized app)
            
            ---
            
            ## Android Installation
            * **Android App:** [Download DukeIgnite_Android.apk](https://github.com/Catsarepro21/DukeIgnite-Flutter/releases/download/${{ steps.tag.outputs.VERSION }}/DukeIgnite_Android.apk)
            
            **Setup Instructions**
            1. **Download:** Tap the download link on your Android device.
            2. **Install:** Open the downloaded `.apk` file.
            3. **Allow Unknown Sources:** If prompted, allow your browser or file manager to "Install Unknown Apps" in your Settings.
            
            ---
            
            ##  iOS Installation
            
            ### 1. Downloads
            * **App File:** [Download DukeIgniteIOSFormaldehydeSensor.ipa](https://github.com/Catsarepro21/DukeIgnite-Flutter/releases/download/${{ steps.tag.outputs.VERSION }}/DukeIgniteIOSFormaldehydeSensor.ipa)
            * **Sideloadly Tool:** [Windows](https://sideloadly.io/SideloadlySetup64.exe) | [macOS](https://sideloadly.io/SideloadlySetup.dmg)
            * **Windows Users Only:** You must also install the web versions of [iTunes](https://www.apple.com/itunes/download/win64) and [iCloud](https://updates.cdn-apple.com/2020/windows/001-39935-20200911-1A70AA56-F448-11EA-8CC0-99D41950005E/iCloudSetup.exe).
            * **(Note that for auto-wifi redeploying, sync over wifi must be enabled in iTunes.)
            ### 2. Sideloading Steps
            1. Open **Sideloadly** and drag the `.ipa` file into the application window.
            2. Enter your **Apple ID** and connect your iOS device via USB.
            3. Press **Start** and wait for the "Done" status.
            
            ### 3. Device Authorization
            1. **Trust Developer:** Go to **Settings > General > VPN & Device Management**, click on developer apps(Will say my email), and select **Trust**.
            2. **Enable Developer Mode:** Go to **Settings > Privacy & Security > Developer Mode**, toggle it **On**, and **Restart** your phone. Select **Turn On** after the reboot.
            
            ---
            
            ## Windows Installation (PC)
            
            ### 1. Download Option A (Installer)
            * **Windows Installer:** [Download DukeIgnite_Installer.exe](https://github.com/Catsarepro21/DukeIgnite-Flutter/releases/download/${{ steps.tag.outputs.VERSION }}/DukeIgnite_Installer.exe)
            
            **Setup Instructions**
            1. **Launch:** Double click the downloaded installer.
            2. **SmartScreen:** If Microsoft SmartScreen appears, click "More info" and "Run anyway".
            3. **Install:** Follow the setup wizard to install the app and create a desktop shortcut.
            
            ---
            
            ### 2. Download Option B (Portable)
            * **Windows Bundle:** [Download DukeIgnite_Windows_Portable.zip](https://github.com/Catsarepro21/DukeIgnite-Flutter/releases/download/${{ steps.tag.outputs.VERSION }}/DukeIgnite_Windows_Portable.zip)
            
            **Setup Instructions**
            1. **Extract the Folder:** Locate the downloaded `.zip` file. Right-click it and select **Extract All...**
            2. **Launch:** Open the newly extracted folder and double-click `DukeIgnite.exe` to start the application.
            3. **SmartScreen:** If Microsoft SmartScreen appears, click "More info" and "Run anyway".
            
            ---
            
            ## Linux Installation
            * **Linux Bundle:** [Download DukeIgnite_Linux.zip](https://github.com/Catsarepro21/DukeIgnite-Flutter/releases/download/${{ steps.tag.outputs.VERSION }}/DukeIgnite_Linux.zip)
            
            **Setup Instructions**
            1. **Extract:** Extract the downloaded `.zip` archive.
            2. **Run:** Execute the `DukeIgnite` binary inside the extracted folder.

      - name: Delete Old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 1
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
